<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A premium, feature-rich music player built with HTML, CSS, and JavaScript. Featuring playlist management, volume control, progress tracking, and autoplay.">
    <title>Pulse Player — Premium Music Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background animated blobs -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header" id="app-header">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 18V5l12-2v13"/>
                        <circle cx="6" cy="18" r="3"/>
                        <circle cx="18" cy="16" r="3"/>
                    </svg>
                </div>
                <span class="logo-text">Pulse<span class="logo-accent">Player</span></span>
            </div>
            <div class="header-actions">
                <button class="btn-icon" id="btn-autoplay" title="Toggle Autoplay">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="17 1 21 5 17 9"/>
                        <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                        <polyline points="7 23 3 19 7 15"/>
                        <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                    </svg>
                    <span class="autoplay-badge">OFF</span>
                </button>
                <button class="btn-icon" id="btn-shuffle" title="Shuffle Playlist">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 3 21 3 21 8"/>
                        <line x1="4" y1="20" x2="21" y2="3"/>
                        <polyline points="21 16 21 21 16 21"/>
                        <line x1="15" y1="15" x2="21" y2="21"/>
                        <line x1="4" y1="4" x2="9" y2="9"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Player Section -->
            <section class="player-section" id="player-section">
                <!-- Album Art -->
                <div class="album-art-container" id="album-art-container">
                    <div class="album-art-glow" id="album-art-glow"></div>
                    <div class="album-art-wrapper">
                        <img src="assets/images/album1.png" alt="Album Art" class="album-art" id="album-art">
                        <div class="vinyl-overlay" id="vinyl-overlay">
                            <div class="vinyl-ring"></div>
                            <div class="vinyl-ring vinyl-ring-2"></div>
                            <div class="vinyl-center"></div>
                        </div>
                    </div>
                </div>

                <!-- Song Info -->
                <div class="song-info" id="song-info">
                    <h1 class="song-title" id="song-title">Neon Dreams</h1>
                    <p class="song-artist" id="song-artist">Cosmic Waves</p>
                </div>

                <!-- Progress Bar -->
                <div class="progress-section" id="progress-section">
                    <span class="time-current" id="time-current">0:00</span>
                    <div class="progress-bar-container" id="progress-bar-container">
                        <div class="progress-bar-bg">
                            <div class="progress-bar-buffered" id="progress-bar-buffered"></div>
                            <div class="progress-bar-fill" id="progress-bar-fill">
                                <div class="progress-bar-thumb" id="progress-bar-thumb"></div>
                            </div>
                        </div>
                    </div>
                    <span class="time-duration" id="time-duration">0:00</span>
                </div>

                <!-- Controls -->
                <div class="controls" id="controls">
                    <button class="btn-control" id="btn-repeat" title="Repeat">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="17 1 21 5 17 9"/>
                            <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                            <polyline points="7 23 3 19 7 15"/>
                            <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                        </svg>
                    </button>
                    <button class="btn-control btn-prev" id="btn-prev" title="Previous">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                        </svg>
                    </button>
                    <button class="btn-play" id="btn-play" title="Play">
                        <svg class="icon-play" width="30" height="30" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                        <svg class="icon-pause hidden" width="30" height="30" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                        </svg>
                    </button>
                    <button class="btn-control btn-next" id="btn-next" title="Next">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                        </svg>
                    </button>
                    <button class="btn-control" id="btn-playlist-toggle" title="Playlist">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="8" y1="6" x2="21" y2="6"/>
                            <line x1="8" y1="12" x2="21" y2="12"/>
                            <line x1="8" y1="18" x2="21" y2="18"/>
                            <line x1="3" y1="6" x2="3.01" y2="6"/>
                            <line x1="3" y1="12" x2="3.01" y2="12"/>
                            <line x1="3" y1="18" x2="3.01" y2="18"/>
                        </svg>
                    </button>
                </div>

                <!-- Volume Control -->
                <div class="volume-section" id="volume-section">
                    <button class="btn-icon btn-volume" id="btn-volume" title="Mute/Unmute">
                        <svg class="icon-volume-high" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                        </svg>
                        <svg class="icon-volume-low hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                        </svg>
                        <svg class="icon-volume-mute hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                            <line x1="23" y1="9" x2="17" y2="15"/>
                            <line x1="17" y1="9" x2="23" y2="15"/>
                        </svg>
                    </button>
                    <div class="volume-slider-container" id="volume-slider-container">
                        <div class="volume-slider-bg">
                            <div class="volume-slider-fill" id="volume-slider-fill">
                                <div class="volume-slider-thumb" id="volume-slider-thumb"></div>
                            </div>
                        </div>
                    </div>
                    <span class="volume-value" id="volume-value">80%</span>
                </div>
            </section>

            <!-- Playlist Section -->
            <section class="playlist-section" id="playlist-section">
                <div class="playlist-header">
                    <h2 class="playlist-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 18V5l12-2v13"/>
                            <circle cx="6" cy="18" r="3"/>
                            <circle cx="18" cy="16" r="3"/>
                        </svg>
                        Playlist
                    </h2>
                    <span class="playlist-count" id="playlist-count">5 tracks</span>
                </div>
                <ul class="playlist" id="playlist">
                    <!-- Playlist items will be dynamically generated -->
                </ul>
            </section>
        </main>

        <!-- Audio Visualizer Canvas -->
        <canvas class="visualizer" id="visualizer"></canvas>
    </div>

    <!-- Hidden Audio Element -->
    <audio id="audio-player" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
